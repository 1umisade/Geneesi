<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mol2 molecule viewer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#c{width:100%;height:100%;display:block;touch-action:none}
#overlay{position:absolute;inset:0;z-index:20;display:flex;
  align-items:center;justify-content:center;background:#fffef9;transition:opacity .8s}
#overlay.gone{opacity:0;pointer-events:none}
.ptr{width:280px;height:5px;background:#e7dcc7;border-radius:3px;overflow:hidden}
.pfil{height:100%;width:100%;background:#8a5a2b;border-radius:3px;
  transform:scaleX(0);transform-origin:left center;transition:transform .3s linear}
.mlbl{position:absolute;z-index:9;pointer-events:none;color:#dff;
  background:rgba(0,10,28,0.72);border:1px solid #2a5070;border-radius:4px;
  padding:1px 6px;font-family:'Courier New',monospace;font-size:10px;
  white-space:nowrap;display:none}
#zoomval{position:absolute;top:12px;right:16px;z-index:10;color:#4c5a48;
  font-family:'Courier New',monospace;font-size:14px;pointer-events:none}
#zoomtips{position:absolute;right:18px;bottom:18px;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  opacity:0;transition:opacity .5s;pointer-events:none;
  font-family:'Courier New',monospace}
#zoomtips.show{opacity:1;pointer-events:auto}
.zt{width:38px;height:38px;font-size:18px;line-height:1;cursor:pointer;
  color:#5a3a1b;background:#fffef9;border:1px solid #8a5a2b;border-radius:7px;
  box-shadow:0 2px 0 #8a5a2b;touch-action:manipulation;user-select:none;
  display:flex;align-items:center;justify-content:center}
.zt:active{transform:translateY(1px);box-shadow:0 1px 0 #8a5a2b}
.ztlabel{font-size:10px;color:#8a5a2b;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div class="ptr"><div class="pfil" id="load-bar"></div></div>
</div>
<div id="zoomval">1.0×</div>
<div id="zoomtips">
  <button class="zt" id="zoom-in" aria-label="Zoom in">+</button>
  <button class="zt" id="zoom-out" aria-label="Zoom out">−</button>
  <span class="ztlabel">suurenna</span>
</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script>
'use strict';

const BOND_R    = 0.10;  // stick radius (Å) — thinner than the smallest ball
const GAP_FRAC  = 0.15;  // side-by-side gap as a fraction of mean model width
const FILL_SCALE = 1.0;  // space-filling sphere size as a fraction of vdW radius

/* ── Standard CPK-ish colours (c), ball radii (r) + van der Waals radii (vr), Å.
      C dark grey, H light grey.  vr drives the space-filling surface mode.  ── */
/* n = nucleon count (mass number) → nucleus size; z = proton count (rest are neutrons). */
const ELEM = {
  H :{c:[0.88,0.88,0.88], r:0.23, vr:1.10, n:1,  z:1 },   C :{c:[0.24,0.24,0.24], r:0.32, vr:1.70, n:12, z:6 },
  N :{c:[0.19,0.31,0.97], r:0.31, vr:1.55, n:14, z:7 },   O :{c:[0.94,0.15,0.15], r:0.30, vr:1.52, n:16, z:8 },
  S :{c:[1.00,0.78,0.16], r:0.38, vr:1.80, n:32, z:16},   P :{c:[1.00,0.50,0.00], r:0.38, vr:1.80, n:31, z:15},
  MG:{c:[0.33,0.78,0.33], r:0.42, vr:1.73, n:24, z:12},   FE:{c:[0.88,0.40,0.20], r:0.42, vr:1.56, n:56, z:26},
  MN:{c:[0.61,0.48,0.78], r:0.42, vr:1.61, n:55, z:25},   CA:{c:[0.24,0.80,0.24], r:0.46, vr:1.97, n:40, z:20},
  ZN:{c:[0.49,0.51,0.69], r:0.40, vr:1.39, n:65, z:30},   CU:{c:[0.78,0.50,0.20], r:0.40, vr:1.40, n:64, z:29},
  CL:{c:[0.24,0.94,0.24], r:0.36, vr:1.75, n:35, z:17},   NA:{c:[0.67,0.36,0.95], r:0.46, vr:2.27, n:23, z:11},
  K :{c:[0.56,0.25,0.83], r:0.52, vr:2.75, n:39, z:19},   CO:{c:[0.94,0.56,0.63], r:0.42, vr:1.52, n:59, z:27},
  FB:{c:[0.55,0.55,0.55], r:0.32, vr:1.60, n:12, z:6 },
};
const info = code => ELEM[EL_LIST[code]] || ELEM.FB;

/* ── Element registry (symbol ↔ small integer code) ───────────────────── */
const EL_CODE = new Map(), EL_LIST = [];
function codeOf(sybyl){
  const dot = sybyl.indexOf('.');
  let sym = (dot === -1 ? sybyl : sybyl.slice(0, dot)).toUpperCase();
  if(!ELEM[sym]) sym = 'FB';
  let c = EL_CODE.get(sym);
  if(c === undefined){ c = EL_LIST.length; EL_CODE.set(sym, c); EL_LIST.push(sym); }
  return c;
}

const setLbl = t => { const e = document.getElementById('load-lbl'); if(e) e.textContent = t; };
const setBar = v => { const e = document.getElementById('load-bar');
  if(e) e.style.transform = 'scaleX(' + Math.max(0, Math.min(1, v/100)) + ')'; };
const yield_ = () => new Promise(r => setTimeout(r, 0));

/* ── Goodsell-style muted palette, coloured by molecular component ─────── */
const CAT_COLORS = [
  [0.52,0.47,0.27],   // 0 protein     — muted olive/khaki
  [0.30,0.48,0.28],   // 1 chlorophyll — muted green
  [0.86,0.47,0.17],   // 2 carotenoid  — orange
  [0.60,0.22,0.18],   // 3 heme        — rust red
  [0.72,0.63,0.39],   // 4 lipid       — tan
  [0.52,0.55,0.62],   // 5 metal/ion   — slate
  [0.60,0.55,0.44],   // 6 other       — neutral tan
];
const RES_CAT = {};
'ALA ARG ASN ASP CYS GLN GLU GLY HIS ILE LEU LYS MET PHE PRO SER THR TRP TYR VAL HOH'.split(' ').forEach(r=>RES_CAT[r]=0);
'CHL CLA PHO BCL'.split(' ').forEach(r=>RES_CAT[r]=1);
'BCR LUT NEX XAT VIO ZEA'.split(' ').forEach(r=>RES_CAT[r]=2);
'HEM HEC'.split(' ').forEach(r=>RES_CAT[r]=3);
'DGD LMG LHG PL9 SQD LMT'.split(' ').forEach(r=>RES_CAT[r]=4);
'CL FE2 FE MG MN CA NA K ZN OEX BCT CU CO'.split(' ').forEach(r=>RES_CAT[r]=5);
const catOf = res => RES_CAT[res] ?? 6;

/* ── Parse a multi-molecule mol2 into typed-array records ──────────────── */
function parseMol2(text){
  const lines = text.split('\n');
  const mols = [];
  let cur = null, section = '';
  for(let i = 0; i < lines.length; i++){
    const ln = lines[i];
    if(ln.charCodeAt(0) === 64){                 // '@' → section marker
      const t = ln.trim();
      if(t === '@<TRIPOS>MOLECULE'){ cur = {name:null}; mols.push(cur); section = 'HDR'; }
      else if(t === '@<TRIPOS>ATOM')  section = 'ATOM';
      else if(t === '@<TRIPOS>BOND')  section = 'BOND';
      else section = 'OTHER';
      continue;
    }
    if(section === 'HDR'){
      if(cur.name === null){ cur.name = ln.trim(); }
      else if(cur.na === undefined){
        const p = ln.trim().split(/\s+/);
        cur.na = +p[0]; cur.nb = +p[1] || 0;
        cur.x  = new Float32Array(cur.na); cur.y = new Float32Array(cur.na);
        cur.z  = new Float32Array(cur.na); cur.el = new Uint16Array(cur.na); cur.ai = 0;
        cur.cat = new Uint8Array(cur.na);
        cur.b1 = new Int32Array(cur.nb);   cur.b2 = new Int32Array(cur.nb);  cur.bi = 0;
      }
      continue;
    }
    if(section === 'ATOM'){
      const p = ln.trim().split(/\s+/);
      if(p.length < 6 || cur.ai >= cur.na) continue;
      const k = cur.ai++;
      cur.x[k] = +p[2]; cur.y[k] = +p[3]; cur.z[k] = +p[4]; cur.el[k] = codeOf(p[5]);
      cur.cat[k] = catOf(p[7] || '');
    } else if(section === 'BOND'){
      const p = ln.trim().split(/\s+/);
      if(p.length < 4 || cur.bi >= cur.nb) continue;
      const k = cur.bi++;
      cur.b1[k] = (+p[1]) - 1; cur.b2[k] = (+p[2]) - 1;
    }
  }
  return mols.filter(m => m.na > 0);
}

/* GPU sphere impostors: a camera-facing quad per atom; the fragment shader
   ray-traces a perfect sphere and writes real depth, so spheres are smooth at
   any zoom and cost 2 triangles each. */
BABYLON.Effect.ShadersStore['impVertexShader'] = `
precision highp float;
attribute vec3 position;
attribute vec4 instanceColor;
attribute vec4 world0;
attribute vec4 world1;
attribute vec4 world2;
attribute vec4 world3;
uniform mat4 view;
uniform mat4 projection;
uniform float radius;
varying vec2 vUV;
varying vec3 vCenterV;
varying vec3 vColor;
void main(void){
  mat4 W = mat4(world0, world1, world2, world3);
  vec4 cV = view * vec4(W[3].xyz, 1.0);
  vCenterV = cV.xyz;
  vUV = position.xy;
  vColor = instanceColor.rgb;
  vec3 cornerV = cV.xyz + vec3(position.xy * radius, 0.0);
  gl_Position = projection * vec4(cornerV, 1.0);
}`;
BABYLON.Effect.ShadersStore['impFragmentShader'] = `
#extension GL_EXT_frag_depth : enable
precision highp float;
uniform mat4 projection;
uniform float radius;
uniform vec3 fogColor;
uniform float fogStart;
uniform float fogEnd;
uniform float isShell;   // 1.0 = translucent vdW shell, 0.0 = solid inner atom
uniform float bubbleR;   // reveal-sphere radius around the camera (view-space distance)
varying vec2 vUV;
varying vec3 vCenterV;
varying vec3 vColor;
const vec3 L = normalize(vec3(0.82, 0.42, -0.38));  // raking light from the side (right)
void main(void){
  float r2 = dot(vUV, vUV);
  if(r2 > 1.0) discard;
  float zc = sqrt(1.0 - r2);
  vec3 n = vec3(vUV, -zc);                 // sphere normal toward camera
  vec3 posV = vCenterV + n * radius;
  float dist = length(vCenterV);           // atom-centre distance from the camera
  if(isShell < 0.5 && dist >= bubbleR) discard;   // inner core only renders inside the bubble
  vec4 clip = projection * vec4(posV, 1.0);
  gl_FragDepthEXT = clip.z / clip.w * 0.5 + 0.5;
  float ndl = dot(n, L) * 0.5 + 0.5;        // soft half-lambert (matte)
  vec3 col = vColor * (0.66 + 0.34 * ndl);
  // shell: translucent inside the bubble, fading to fully opaque at its edge
  float shellOp = mix(0.30, 1.0, smoothstep(bubbleR*0.80, bubbleR, dist));
  float op = (isShell > 0.5) ? shellOp : 1.0;
  float solid = step(0.999, op);            // ink rim / self-shade only where opaque
  col *= 1.0 - 0.14 * smoothstep(0.55, 1.0, r2) * solid;              // self-shade only on solid spheres
  col *= mix(1.0, mix(1.0, 0.12, smoothstep(0.9, 1.0, r2)), solid);  // ink rim only on solid spheres
  float fog = clamp((fogEnd - posV.z) / (fogEnd - fogStart), 0.0, 1.0);
  gl_FragColor = vec4(mix(fogColor, col, fog), op);
}`;

/* Bond sticks — lit cylinders that only render inside the camera reveal-bubble. */
BABYLON.Effect.ShadersStore['bondVertexShader'] = `
precision highp float;
attribute vec3 position;
attribute vec3 normal;
attribute vec4 world0;
attribute vec4 world1;
attribute vec4 world2;
attribute vec4 world3;
uniform mat4 view;
uniform mat4 projection;
varying vec3 vViewPos;
varying vec3 vNrmV;
void main(void){
  mat4 W = mat4(world0, world1, world2, world3);
  vec4 vp = view * W * vec4(position, 1.0);
  vViewPos = vp.xyz;
  vNrmV = (view * W * vec4(normal, 0.0)).xyz;
  gl_Position = projection * vp;
}`;
BABYLON.Effect.ShadersStore['bondFragmentShader'] = `
precision highp float;
uniform vec3 color;
uniform float bubbleR;
uniform float opacity;
uniform vec3 fogColor;
uniform float fogStart;
uniform float fogEnd;
varying vec3 vViewPos;
varying vec3 vNrmV;
const vec3 L = normalize(vec3(0.82, 0.42, -0.38));
void main(void){
  if(length(vViewPos) >= bubbleR) discard;   // orbital lobes only inside the camera bubble
  float ndl = dot(normalize(vNrmV), L) * 0.5 + 0.5;
  vec3 c = color * (0.55 + 0.45 * ndl);
  float fog = clamp((fogEnd - vViewPos.z) / (fogEnd - fogStart), 0.0, 1.0);
  gl_FragColor = vec4(mix(fogColor, c, fog), opacity);
}`;
/* Screen-space ambient occlusion reading the depth packed in alpha: a fragment
   surrounded by nearer neighbours sits in a tunnel → darken it. */
BABYLON.Effect.ShadersStore['aoFragmentShader'] = `
precision highp float;
varying vec2 vUV;
uniform sampler2D textureSampler;
uniform vec2 texel;
uniform float strength;
uniform float r1;    // AO sample radii in texels — scaled by supersample factor so
uniform float r2;    // the on-screen crevice size stays constant at any internal res
void main(void){
  vec4 c = texture2D(textureSampler, vUV);
  if(c.a >= 0.985){ gl_FragColor = vec4(c.rgb, 1.0); return; }   // background — no AO
  float d = c.a, occ = 0.0;
  for(int i=0;i<12;i++){
    float a = float(i) * 0.5235988;
    vec2 dir = vec2(cos(a), sin(a));
    float n1 = texture2D(textureSampler, vUV + dir*texel*r1).a;
    float n2 = texture2D(textureSampler, vUV + dir*texel*r2).a;
    // range check: occlude ONLY across tight contact crevices; reject any wider
    // depth gap so no soft occlusion haze forms around silhouette edges
    occ += step(n1 + 0.004, d) * (1.0 - smoothstep(0.006, 0.014, d - n1));
    occ += 0.5 * step(n2 + 0.006, d) * (1.0 - smoothstep(0.008, 0.018, d - n2));
  }
  occ = min(occ / 12.0, 1.0);
  gl_FragColor = vec4(c.rgb * (1.0 - strength*occ), 1.0);
}`;

let engine = null;

/* ── Fetch + parse + build a mol2 file, then render it ─────────────────── */
async function run(fileName){
  const url = /^(https?:|\.?\/)/.test(fileName) ? fileName : './' + fileName;

  /* Fetch (streamed for a progress bar) */
  setLbl(`Fetching ${fileName}…`);
  const res = await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status} — is "${fileName}" next to index.html?`);
  const total = +res.headers.get('Content-Length') || 0;
  const reader = res.body.getReader(); const chunks = []; let got = 0;
  for(;;){
    const {done, value} = await reader.read();
    if(done) break; chunks.push(value); got += value.length;
    if(total) setBar((got / total) * 55);   // download fills the first ~55%
  }
  const buf = new Uint8Array(got); let off = 0;
  for(const ch of chunks){ buf.set(ch, off); off += ch.length; }
  // Compositor-driven creep to ~96% so the bar keeps moving smoothly through the
  // main-thread-blocking parse + build phases (transform animates off the main thread).
  const barEl = document.getElementById('load-bar');
  if(barEl){ barEl.style.transition = 'transform 5s cubic-bezier(0.15,0.75,0.2,1)';
             barEl.style.transform  = 'scaleX(0.96)'; }
  await new Promise(r => { requestAnimationFrame(() => requestAnimationFrame(r)); setTimeout(r, 120); });  // commit (rAF), with timeout fallback for hidden tabs
  const mols = parseMol2(new TextDecoder().decode(buf));
  if(mols.length === 0) throw new Error('No molecules found in file');

  // Rotate 90° about Z so the long axis lies horizontal (PSII lands on its side)
  for(const m of mols){
    for(let k=0;k<m.na;k++){ const x=m.x[k], y=m.y[k]; m.x[k]=y; m.y[k]=-x; }
  }

  /* Lay models out side by side; compute per-model bbox + offset */
  setLbl('Arranging models…'); await yield_();
  const box = [];
  for(const m of mols){
    let miX=Infinity,miY=Infinity,miZ=Infinity,maX=-Infinity,maY=-Infinity,maZ=-Infinity;
    for(let k=0;k<m.na;k++){
      const x=m.x[k],y=m.y[k],z=m.z[k];
      if(x<miX)miX=x; if(y<miY)miY=y; if(z<miZ)miZ=z;
      if(x>maX)maX=x; if(y>maY)maY=y; if(z>maZ)maZ=z;
    }
    box.push({miX,miY,miZ,maX,maY,maZ,w:maX-miX});
  }
  const meanW = box.reduce((s,b)=>s+b.w,0)/box.length;
  const gap   = meanW*GAP_FRAC;
  const rowW  = box.reduce((s,b)=>s+b.w,0)+gap*(mols.length-1);
  let cursor  = -rowW/2;
  for(let mi=0;mi<mols.length;mi++){
    const b=box[mi];
    const cx=(b.miX+b.maX)/2, cy=(b.miY+b.maY)/2, cz=(b.miZ+b.maZ)/2;
    mols[mi].ox = (cursor + b.w/2) - cx; mols[mi].oy = -cy; mols[mi].oz = -cz;
    cursor += b.w + gap;
  }

  /* Count atoms + bond-halves per element (for typed-array sizing) */
  const nEl = EL_LIST.length;
  const atomCount = new Uint32Array(nEl), halfCount = new Uint32Array(nEl);
  for(const m of mols){
    for(let k=0;k<m.na;k++) atomCount[m.el[k]]++;
    for(let k=0;k<m.nb;k++){
      const a1=m.b1[k], a2=m.b2[k];
      if(a1<0||a1>=m.na||a2<0||a2>=m.na) continue;
      halfCount[m.el[a1]]++; halfCount[m.el[a2]]++;
    }
  }

  /* Engine/scene */
  const canvas = document.getElementById('c');
  engine = new BABYLON.Engine(canvas, true, {stencil:false});
  // Supersample: render at higher internal res so the shader-drawn sphere edges /
  // ink outlines are anti-aliased (no FXAA). hardwareScalingLevel < 1 = higher res.
  // Start ~1.5× above device pixels, capped at 2.5× linear; adaptive backoff below.
  const SS_MIN = 0.4;                                   // floor = max supersample (2.5× linear)
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  engine.setHardwareScalingLevel(Math.max(SS_MIN, 1 / (dpr * 1.75)));
  const scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(1.0,0.996,0.976,1);   // #fffef9
  scene.fogMode  = BABYLON.Scene.FOGMODE_LINEAR;               // depth shadow: distant = darker
  scene.fogColor = new BABYLON.Color3(0.16,0.17,0.13);         // dark olive-grey (not black) → lighter vibe
  const cam = new BABYLON.ArcRotateCamera('cam', -Math.PI/2, Math.PI/2.3, 100,
    BABYLON.Vector3.Zero(), scene);
  cam.attachControl(canvas, true);
  cam.fov = 0.8; cam.minZ = 0.02; cam.inertia = 0.85; cam.panningSensibility = 20;
  cam.lowerBetaLimit = null; cam.upperBetaLimit = null;   // full 360° vertical rotation
  cam.inputs.attached.pointers.buttons = [0, 2];          // middle button freed for drag-zoom (left=rotate, right=pan)
  canvas.addEventListener('mousedown', e => { if(e.button === 1) e.preventDefault(); });   // block middle-click autoscroll
  // Show the zoom tips while dragging; keep them 2 s after release (or after a tap).
  const tips = document.getElementById('zoomtips');
  let hideTimer = null;
  const showTips = () => { if(!tips) return; clearTimeout(hideTimer); hideTimer = null; tips.classList.add('show'); };
  const hideTipsSoon = () => { if(!tips) return; clearTimeout(hideTimer); hideTimer = setTimeout(() => tips.classList.remove('show'), 2000); };
  let dragging = false;   // suppress hover-picking while rotating (keeps the drag smooth)
  // Zoom that flies THROUGH the model without flipping: once the radius hits a small
  // floor, the pivot dollies forward along the view instead of the radius going negative.
  const zoomBy = delta => {                 // delta < 0 = closer
    const hi = cam.upperRadiusLimit ?? 1e9, minR = fitRadius * 0.02;
    const r = cam.radius + delta;
    if(r < minR){
      const fwd = cam.getForwardRay(1).direction;   // camera → target
      cam.target.addInPlace(fwd.scale(minR - r));    // slide pivot forward; camera follows (no flip)
      cam.radius = minR;
    } else {
      cam.radius = Math.min(r, hi);
    }
  };
  const dragZoom = dz => zoomBy(dz * Math.max(fitRadius * 0.0025, Math.abs(cam.radius) * 0.005));  // middle-drag
  scene.onPointerObservable.add(p => {
    if(p.type === BABYLON.PointerEventTypes.POINTERDOWN && p.event.button === 0){ showTips(); dragging = true; }
    else if(p.type === BABYLON.PointerEventTypes.POINTERDOWN && p.event.button === 1) showTips();
    else if(p.type === BABYLON.PointerEventTypes.POINTERUP){ hideTipsSoon(); dragging = false; }
    else if(p.type === BABYLON.PointerEventTypes.POINTERMOVE && (p.event.buttons & 4)){   // middle held
      dragZoom(p.event.movementY || 0); showTips();
    }
  });

  // Custom wheel + buttons route through zoomBy so they dolly through too (no flip).
  cam.inputs.removeByType('ArcRotateCameraKeyboardMoveInput');
  cam.inputs.removeByType('ArcRotateCameraMouseWheelInput');
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    zoomBy(Math.sign(e.deltaY) * Math.max(fitRadius * 0.03, Math.abs(cam.radius) * 0.06));
    showTips(); hideTipsSoon();
  }, {passive:false});
  const btnZoom = dir => { zoomBy(dir * Math.max(fitRadius * 0.04, Math.abs(cam.radius) * 0.06)); showTips(); hideTipsSoon(); };
  document.getElementById('zoom-in').addEventListener('click',  () => btnZoom(-1));
  document.getElementById('zoom-out').addEventListener('click', () => btnZoom(1));
  // Ambient fill + a headlight that follows the camera (direction set each frame),
  // so shading stays consistent as the model rotates instead of sweeping around.
  const hemi = new BABYLON.HemisphericLight('h', new BABYLON.Vector3(0,1,0), scene);
  hemi.intensity = 0.80; hemi.groundColor = new BABYLON.Color3(0.50,0.50,0.50);  // flat, matte fill
  const dir = new BABYLON.DirectionalLight('d', new BABYLON.Vector3(0,-0.4,1), scene);
  dir.intensity = 0.45;   // gentle form; AO + rim carry the shading

  /* Allocate instance buffers + build geometry */
  setLbl(`Building ${mols.length} model(s)…`); await yield_();
  const sphBuf = [], cylBuf = [], colBuf = [], elColBuf = [], sphIdx = new Uint32Array(nEl), cylIdx = new Uint32Array(nEl);
  for(let e=0;e<nEl;e++){
    sphBuf[e] = new Float32Array(atomCount[e]*16);
    cylBuf[e] = new Float32Array(halfCount[e]*16);
    colBuf[e] = new Float32Array(atomCount[e]*4);   // per-instance surface colour (by component)
    elColBuf[e] = new Float32Array(atomCount[e]*4); // per-instance CPK element colour (inner ball-and-stick)
    const ec = info(e).c;
    for(let j=0;j<atomCount[e];j++){ elColBuf[e][j*4]=ec[0]; elColBuf[e][j*4+1]=ec[1]; elColBuf[e][j*4+2]=ec[2]; elColBuf[e][j*4+3]=1; }
  }
  const _m = new BABYLON.Matrix(), _q = new BABYLON.Quaternion(),
        _s = new BABYLON.Vector3(), _p = new BABYLON.Vector3(), _ax = new BABYLON.Vector3();
  const LOBE_W = 0.42;                 // hybrid-orbital lobe width (Å)
  // Build an ellipsoid (lobe) spanning s→e: width LOBE_W across, length = |s→e| along the axis.
  function cylTo(sx,sy,sz, ex,ey,ez, dstBuf, dstOff){
    let dx=ex-sx, dy=ey-sy, dz=ez-sz;
    const len=Math.hypot(dx,dy,dz)||1e-6, inv=1/len; dx*=inv; dy*=inv; dz*=inv;
    if(dy>0.999999) _q.set(0,0,0,1);
    else if(dy<-0.999999) _q.set(1,0,0,0);
    else { _ax.set(dz,0,-dx); _ax.normalize(); BABYLON.Quaternion.RotationAxisToRef(_ax, Math.acos(dy), _q); }
    _s.set(LOBE_W,len,LOBE_W); _p.set((sx+ex)*0.5,(sy+ey)*0.5,(sz+ez)*0.5);
    BABYLON.Matrix.ComposeToRef(_s,_q,_p,_m); _m.copyToArray(dstBuf,dstOff);
  }

  for(const m of mols){
    const ox=m.ox, oy=m.oy, oz=m.oz;
    for(let k=0;k<m.na;k++){
      const e=m.el[k], ci=sphIdx[e]++;
      BABYLON.Matrix.TranslationToRef(m.x[k]+ox, m.y[k]+oy, m.z[k]+oz, _m);
      _m.copyToArray(sphBuf[e], ci*16);
      const col = CAT_COLORS[m.cat[k]];
      colBuf[e][ci*4]=col[0]; colBuf[e][ci*4+1]=col[1]; colBuf[e][ci*4+2]=col[2]; colBuf[e][ci*4+3]=1;
    }
    for(let k=0;k<m.nb;k++){
      const a1=m.b1[k], a2=m.b2[k];
      if(a1<0||a1>=m.na||a2<0||a2>=m.na) continue;
      const x1=m.x[a1]+ox, y1=m.y[a1]+oy, z1=m.z[a1]+oz;
      const x2=m.x[a2]+ox, y2=m.y[a2]+oy, z2=m.z[a2]+oz;
      const e1=m.el[a1], e2=m.el[a2], f=0.62;   // each lobe reaches past the midpoint → the two orbitals overlap
      cylTo(x1,y1,z1, x1+(x2-x1)*f, y1+(y2-y1)*f, z1+(z2-z1)*f, cylBuf[e1], (cylIdx[e1]++)*16);
      cylTo(x2,y2,z2, x2+(x1-x2)*f, y2+(y1-y2)*f, z2+(z1-z2)*f, cylBuf[e2], (cylIdx[e2]++)*16);
    }
  }
  await yield_();

  const BUBBLE_R = 99.0;      // camera reveal-sphere radius (Å) — atoms within it go translucent
  const coreMeshes = [];      // inner atoms + bonds, enabled only when the bubble reaches the model

  /* ── Nucleus = packed cluster of protons (red) + neutrons (grey) ──────────
     FCC packing offsets (nearest-neighbour distance normalised to 1), sorted by
     distance from the centre; the first A of them form each nucleus. */
  const fcc = (() => {
    const p = [];
    for(let i=-4;i<=4;i++) for(let j=-4;j<=4;j++) for(let k=-4;k<=4;k++)
      if(((i+j+k)&1)===0) p.push([i,j,k, i*i+j*j+k*k]);
    p.sort((a,b)=>a[3]-b[3]);
    const s = 1/Math.SQRT2;
    return p.map(q => [q[0]*s, q[1]*s, q[2]*s]);
  })();
  const PROTON = [0.90,0.28,0.24], NEUTRON = [0.60,0.63,0.68];
  // Every proton & neutron is the SAME size; the nucleus grows as it packs more of
  // them (radius ∝ A^⅓), so hydrogen's single nucleon matches carbon's nucleons.
  const NUCLEON_R = 0.13, SPACING = 2*NUCLEON_R;
  const nucClusterR = e => { const A = info(e).n; const dm = A>1 ? Math.hypot(fcc[A-1][0],fcc[A-1][1],fcc[A-1][2]) : 0; return dm*SPACING + NUCLEON_R; };
  const nucBuf = [], nucColBuf = [];
  for(let e=0;e<nEl;e++){
    const A = info(e).n;
    nucBuf[e]    = new Float32Array(atomCount[e]*A*16);
    nucColBuf[e] = new Float32Array(atomCount[e]*A*4);
  }
  for(let e=0;e<nEl;e++){
    if(atomCount[e]===0) continue;
    const A = info(e).n, Z = info(e).z, sc = SPACING, nb = nucBuf[e], nc = nucColBuf[e], sb = sphBuf[e];
    for(let a=0;a<atomCount[e];a++){
      const cx = sb[a*16+12], cy = sb[a*16+13], cz = sb[a*16+14];
      for(let i=0;i<A;i++){
        const idx = a*A+i, o = idx*16;
        nb[o]=1; nb[o+5]=1; nb[o+10]=1; nb[o+15]=1;              // identity rotation/scale
        nb[o+12] = cx + fcc[i][0]*sc; nb[o+13] = cy + fcc[i][1]*sc; nb[o+14] = cz + fcc[i][2]*sc;
        const proton = Math.floor((i+1)*Z/A) > Math.floor(i*Z/A);   // spread Z protons evenly through the A nucleons
        const col = proton ? PROTON : NEUTRON, co = idx*4;
        nc[co]=col[0]; nc[co+1]=col[1]; nc[co+2]=col[2]; nc[co+3]=1;
      }
    }
    await yield_();
  }
  const impostorMat = (name, radius, isShell) => {
    const mat = new BABYLON.ShaderMaterial(name, scene, 'imp', {
      attributes: ['position','instanceColor','world0','world1','world2','world3'],
      uniforms: ['view','projection','radius','fogColor','fogStart','fogEnd','isShell','bubbleR']
    });
    mat.setFloat('radius', radius);
    mat.setFloat('isShell', isShell);
    mat.setFloat('bubbleR', BUBBLE_R);
    mat.backFaceCulling = false;
    mat.onBindObservable.add(() => {
      const eff = mat.getEffect(); if(!eff) return;
      eff.setColor3('fogColor', scene.fogColor);
      eff.setFloat('fogStart', scene.fogStart);
      eff.setFloat('fogEnd', scene.fogEnd);
    });
    return mat;
  };

  setLbl('Uploading to GPU…'); await yield_();
  for(let e=0;e<nEl;e++){
    if(atomCount[e] === 0) continue;

    /* Nucleus — a packed cluster of proton + neutron impostors (opaque core). */
    const nucMat = impostorMat('impNuc'+e, NUCLEON_R, 0.0);   // isShell = 0 (solid); every nucleon the same size
    const nuc = BABYLON.MeshBuilder.CreatePlane('b'+e, {size:2}, scene);
    nuc.material = nucMat; nuc.isPickable = false;
    nuc.thinInstanceSetBuffer('matrix', nucBuf[e], 16, true);
    nuc.thinInstanceSetBuffer('instanceColor', nucColBuf[e], 4, true);
    nuc.alwaysSelectAsActiveMesh = true; coreMeshes.push(nuc);

    /* Hybrid-orbital lobes (translucent, element-coloured ellipsoids). Each half
       reaches past the bond midpoint so the two atoms' orbitals visibly overlap. */
    if(halfCount[e] > 0){
      const bc = info(e).c;
      const bondMat = new BABYLON.ShaderMaterial('bond'+e, scene, 'bond', {
        attributes: ['position','normal','world0','world1','world2','world3'],
        uniforms: ['view','projection','color','bubbleR','opacity','fogColor','fogStart','fogEnd']
      });
      bondMat.setColor3('color', new BABYLON.Color3(bc[0], bc[1], bc[2]));
      bondMat.setFloat('bubbleR', BUBBLE_R);
      bondMat.setFloat('opacity', 0.6);
      bondMat.alpha = 0.6;                 // transparent queue
      bondMat.forceDepthWrite = true;      // stable ordering (no popping while rotating)
      bondMat.backFaceCulling = false;
      bondMat.onBindObservable.add(() => {
        const eff = bondMat.getEffect(); if(!eff) return;
        eff.setColor3('fogColor', scene.fogColor);
        eff.setFloat('fogStart', scene.fogStart);
        eff.setFloat('fogEnd', scene.fogEnd);
      });
      const cyl = BABYLON.MeshBuilder.CreateSphere('c'+e, {segments:4, diameter:1}, scene);   // low-poly → ellipsoid lobe
      cyl.material = bondMat; cyl.isPickable = false;
      cyl.thinInstanceSetBuffer('matrix', cylBuf[e], 16, true);
      cyl.alwaysSelectAsActiveMesh = true; coreMeshes.push(cyl);
    }

    /* Van der Waals shell — GPU sphere impostors. Per-fragment opacity comes from the
       atom's distance to the camera: translucent inside the reveal-bubble, opaque
       outside. forceDepthWrite → nearest-wins, so overlaps don't stack. */
    const impMat = impostorMat('imp'+e, info(e).vr*FILL_SCALE, 1.0);   // isShell = 1
    impMat.alpha = 0.30;                 // transparent render queue (blending enabled)
    impMat.forceDepthWrite = true;       // depth-write on → stable ordering (no disappearing atoms while rotating)
    const fill = BABYLON.MeshBuilder.CreatePlane('f'+e, {size:2}, scene);
    fill.material = impMat; fill.isPickable = true;
    fill.thinInstanceEnablePicking = true;
    fill.thinInstanceSetBuffer('matrix', sphBuf[e], 16, true);
    fill.thinInstanceSetBuffer('instanceColor', colBuf[e], 4, true);
    fill.alwaysSelectAsActiveMesh = true;   // instances span the model; skip base-plane culling
  }
  // Core (inner atoms + bonds) is enabled only when the camera bubble reaches the model.
  let coreOn = false;
  for(const m of coreMeshes) m.setEnabled(false);

  /* Frame camera on the whole row (fit both axes for any viewport aspect) */
  let gMiX=Infinity,gMiY=Infinity,gMaX=-Infinity,gMaY=-Infinity,gMiZ=Infinity,gMaZ=-Infinity;
  for(let mi=0;mi<mols.length;mi++){
    const b=box[mi];
    gMiX=Math.min(gMiX,b.miX+mols[mi].ox); gMaX=Math.max(gMaX,b.maX+mols[mi].ox);
    gMiY=Math.min(gMiY,b.miY+mols[mi].oy); gMaY=Math.max(gMaY,b.maY+mols[mi].oy);
    gMiZ=Math.min(gMiZ,b.miZ+mols[mi].oz); gMaZ=Math.max(gMaZ,b.maZ+mols[mi].oz);
  }
  const dimX=gMaX-gMiX, dimY=gMaY-gMiY, dimZ=Math.max(gMaZ-gMiZ,1);
  cam.setTarget(new BABYLON.Vector3((gMiX+gMaX)/2,(gMiY+gMaY)/2,(gMiZ+gMaZ)/2));
  const aspect = engine.getRenderWidth()/Math.max(engine.getRenderHeight(),1);
  const tanV = Math.tan(cam.fov/2);
  cam.radius = Math.max(dimY/2/tanV, dimX/2/(tanV*aspect), dimZ)*1.08;
  cam.lowerRadiusLimit = cam.radius*0.02;   // small positive floor → no camera flip; zoomBy() dollies through instead
  cam.upperRadiusLimit = cam.radius*5;
  cam.wheelPrecision   = 40/Math.max(dimX,1);               // additive wheel step crosses 0 for the fly-through
  cam.panningSensibility = 6000/Math.max(dimX,1);

  // Headlight follows the camera; fog darkens fragments by distance (front→back)
  const modelR = 0.5*Math.hypot(dimX,dimY,dimZ);
  const fitRadius = cam.radius;                    // radius at which the whole model fits
  const zoomEl = document.getElementById('zoomval');
  let lowFrames = 0;   // adaptive supersample: back off resolution if FPS sags (Firefox / weak GPUs)
  scene.onBeforeRenderObservable.add(() => {
    const f = cam.getDirection(BABYLON.Axis.Z);   // view forward
    const u = cam.getDirection(BABYLON.Axis.Y);   // view up
    const r = cam.getDirection(BABYLON.Axis.X);   // view right
    dir.direction = f.add(u.scale(-0.45)).add(r.scale(0.25)).normalize();  // from slightly above/right of the viewer
    const ar = Math.abs(cam.radius);                            // abs → fog still works inside / on the far side
    scene.fogStart = Math.max(0.1, ar - modelR*0.55);           // steeper ramp = more contrast
    scene.fogEnd   = ar + modelR*0.6;
    const zoom = fitRadius / Math.max(0.01, ar);
    if(zoomEl) zoomEl.textContent = zoom.toFixed(1) + '×';
    // Enable the inner core only when the camera bubble can actually reach the model
    // (nearest atom ≈ |radius| − modelR). Keeps the far overview cheap.
    const coreWanted = (ar - modelR) < BUBBLE_R;
    if(coreWanted !== coreOn){ coreOn = coreWanted; for(const m of coreMeshes) m.setEnabled(coreWanted); }
    if(engine.getFps() < 30){
      if(++lowFrames > 60){ lowFrames = 0;
        const cur = engine.getHardwareScalingLevel();
        if(cur < 1.0) engine.setHardwareScalingLevel(Math.min(cur + 0.15, 1.0));  // lower res until smooth
      }
    } else lowFrames = 0;
  });

  /* ── Hover highlight + double-click flash/focus ──────────────────────────
     A single emissive sphere follows the atom under the cursor; double-click
     pulses it and eases the camera onto that atom. */
  const hlMat = new BABYLON.StandardMaterial('hlMat', scene);
  hlMat.emissiveColor = new BABYLON.Color3(1.0, 0.92, 0.45);   // warm highlight glow
  hlMat.diffuseColor  = new BABYLON.Color3(0,0,0);
  hlMat.specularColor = new BABYLON.Color3(0,0,0);
  hlMat.disableLighting = true; hlMat.alpha = 0.45;
  const hl = BABYLON.MeshBuilder.CreateSphere('hl', {diameter:1, segments:16}, scene);
  hl.material = hlMat; hl.isPickable = false; hl.setEnabled(false);
  hl.renderingGroupId = 1;                                     // draw on top of the translucent shell

  // Exact ray-vs-sphere pick: nearest atom (by true vdW sphere) in front of the camera.
  // The impostor quads don't match the visible spheres, so scene.pick was unreliable
  // and made double-click jump to the wrong / a behind-camera atom.
  const pickAtom = () => {
    const ray = scene.createPickingRay(scene.pointerX, scene.pointerY, BABYLON.Matrix.Identity(), cam);
    const ox = ray.origin.x, oy = ray.origin.y, oz = ray.origin.z;
    const dx = ray.direction.x, dy = ray.direction.y, dz = ray.direction.z;
    let bestT = Infinity, bE = -1, bA = -1;
    for(let e=0;e<nEl;e++){
      const vr2 = info(e).vr*info(e).vr, sb = sphBuf[e], cnt = atomCount[e];
      for(let a=0;a<cnt;a++){
        const px = sb[a*16+12]-ox, py = sb[a*16+13]-oy, pz = sb[a*16+14]-oz;
        const tca = px*dx + py*dy + pz*dz;
        if(tca <= 0) continue;                                   // behind the camera
        const d2 = px*px+py*py+pz*pz - tca*tca;
        if(d2 > vr2) continue;                                   // ray misses this sphere
        const t = tca - Math.sqrt(vr2 - d2);
        if(t < bestT){ bestT = t; bE = e; bA = a; }
      }
    }
    if(bE < 0) return null;
    const sb = sphBuf[bE], o = bA*16;
    return { center: new BABYLON.Vector3(sb[o+12], sb[o+13], sb[o+14]), nr: nucClusterR(bE) };
  };

  let hoverT = 0, flashUntil = 0, flashC = null, flashVr = 0;
  const setHL = (c, vr, scale, alpha) => {
    hl.position.copyFrom(c); const s = 2*vr*scale; hl.scaling.set(s,s,s);
    hlMat.alpha = alpha; hl.setEnabled(true);
  };
  // Per-frame: run the flash pulse, else keep the hover glow parked on the atom.
  scene.onBeforeRenderObservable.add(() => {
    const now = performance.now();
    if(now < flashUntil && flashC){
      const t = (flashUntil - now) / 600;                     // 1 → 0
      setHL(flashC, flashVr, 1.05 * (1.0 + 0.7*t), 0.30 + 0.55*t);   // bright pop that shrinks in
    }
  });

  const centerOnAtom = () => {
    const a = pickAtom(); if(!a) return;
    flashC = a.center; flashVr = a.nr; flashUntil = performance.now() + 600;   // flash the nucleus
    const ease = new BABYLON.CubicEase(); ease.setEasingMode(BABYLON.EasingFunction.EASINGMODE_EASEINOUT);
    cam.inertialPanningX = cam.inertialPanningY = 0;
    BABYLON.Animation.CreateAndStartAnimation('center', cam, 'target', 60, 22,        // focus
      cam.target.clone(), a.center.clone(), BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT, ease);
  };
  canvas.addEventListener('dblclick', centerOnAtom);                                // desktop
  scene.onPointerObservable.add(p => {
    if(p.type === BABYLON.PointerEventTypes.POINTERDOUBLETAP){ centerOnAtom(); return; }   // touch double-tap
    if(p.type === BABYLON.PointerEventTypes.POINTERMOVE){                                   // hover highlight
      const now = performance.now();
      if(dragging || p.event.buttons || now - hoverT < 80 || now < flashUntil) return;   // skip while any button held; throttle; don't fight the flash
      hoverT = now;
      const a = pickAtom();
      if(a) setHL(a.center, a.nr, 1.25, 0.5); else hl.setEnabled(false);   // tight halo on the nucleus
    }
  });

  /* Floating per-model labels (multi-molecule files only) */
  const labels = mols.length===1 ? [] : mols.map((m,mi) => {
    const el = document.createElement('div'); el.className = 'mlbl';
    el.textContent = m.name; document.body.appendChild(el);
    const b = box[mi];
    el.pos = new BABYLON.Vector3((b.miX+b.maX)/2+m.ox, b.maY+m.oy+dimY*0.02, (b.miZ+b.maZ)/2+m.oz);
    return el;
  });
  scene.registerAfterRender(() => {
    const vp = cam.viewport.toGlobal(engine.getRenderWidth(), engine.getRenderHeight());
    const tm = scene.getTransformMatrix();
    for(const el of labels){
      const p = BABYLON.Vector3.Project(el.pos, BABYLON.Matrix.Identity(), tm, vp);
      const vis = p.z>0 && p.z<1;
      el.style.display = vis ? 'block' : 'none';
      if(vis){ el.style.left=(p.x-el.offsetWidth/2)+'px'; el.style.top=(p.y-el.offsetHeight-4)+'px'; }
    }
  });

  if(barEl){ barEl.style.transition = 'transform 0.25s ease-out'; barEl.style.transform = 'scaleX(1)'; }
  document.getElementById('overlay').classList.add('gone');

  // AO is disabled in the translucent "inside" view — it packs depth into the alpha
  // channel, which the transparent shell now uses for blending (the two can't coexist).
  // FXAA + supersampling still smooth the edges.
  new BABYLON.FxaaPostProcess('fxaa', 1.0, cam);
  engine.runRenderLoop(() => scene.render());
  window.addEventListener('resize', () => engine.resize());
}

/* ── Auto-load PSII on page load (no prompt) ───────────────────────────── */
run('PSII.mol2').catch(err => {
  console.error(err);
  setLbl('Error: ' + err.message);
});
</script>
</body>
</html>
