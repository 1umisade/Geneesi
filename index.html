<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mol2 molecule viewer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#c{width:100%;height:100%;display:block;touch-action:none}
#overlay{position:absolute;inset:0;z-index:20;display:flex;
  align-items:center;justify-content:center;background:#fffef9;transition:opacity .8s}
#overlay.gone{opacity:0;pointer-events:none}
.ptr{width:280px;height:5px;background:#e7dcc7;border-radius:3px;overflow:hidden}
.pfil{height:100%;width:100%;background:#8a5a2b;border-radius:3px;
  transform:scaleX(0);transform-origin:left center;transition:transform .3s linear}
.mlbl{position:absolute;z-index:9;pointer-events:none;color:#dff;
  background:rgba(0,10,28,0.72);border:1px solid #2a5070;border-radius:4px;
  padding:1px 6px;font-family:'Courier New',monospace;font-size:10px;
  white-space:nowrap;display:none}
#zoomtips{position:absolute;right:18px;bottom:18px;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  opacity:0;transition:opacity .5s;pointer-events:none;
  font-family:'Courier New',monospace}
#zoomtips.show{opacity:1;pointer-events:auto}
.zt{width:38px;height:38px;font-size:18px;line-height:1;cursor:pointer;
  color:#5a3a1b;background:#fffef9;border:1px solid #8a5a2b;border-radius:7px;
  box-shadow:0 2px 0 #8a5a2b;touch-action:manipulation;user-select:none;
  display:flex;align-items:center;justify-content:center}
.zt:active{transform:translateY(1px);box-shadow:0 1px 0 #8a5a2b}
.ztlabel{font-size:10px;color:#8a5a2b;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div class="ptr"><div class="pfil" id="load-bar"></div></div>
</div>
<div id="zoomtips">
  <button class="zt" id="zoom-in" aria-label="Zoom in">+</button>
  <button class="zt" id="zoom-out" aria-label="Zoom out">−</button>
  <span class="ztlabel">suurenna</span>
</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script>
'use strict';

const BOND_R    = 0.10;  // stick radius (Å) — thinner than the smallest ball
const GAP_FRAC  = 0.15;  // side-by-side gap as a fraction of mean model width
const FILL_SCALE = 1.0;  // space-filling sphere size as a fraction of vdW radius

/* ── Standard CPK-ish colours (c), ball radii (r) + van der Waals radii (vr), Å.
      C dark grey, H light grey.  vr drives the space-filling surface mode.  ── */
const ELEM = {
  H :{c:[0.88,0.88,0.88], r:0.23, vr:1.10},   C :{c:[0.24,0.24,0.24], r:0.32, vr:1.70},
  N :{c:[0.19,0.31,0.97], r:0.31, vr:1.55},   O :{c:[0.94,0.15,0.15], r:0.30, vr:1.52},
  S :{c:[1.00,0.78,0.16], r:0.38, vr:1.80},   P :{c:[1.00,0.50,0.00], r:0.38, vr:1.80},
  MG:{c:[0.33,0.78,0.33], r:0.42, vr:1.73},   FE:{c:[0.88,0.40,0.20], r:0.42, vr:1.56},
  MN:{c:[0.61,0.48,0.78], r:0.42, vr:1.61},   CA:{c:[0.24,0.80,0.24], r:0.46, vr:1.97},
  ZN:{c:[0.49,0.51,0.69], r:0.40, vr:1.39},   CU:{c:[0.78,0.50,0.20], r:0.40, vr:1.40},
  CL:{c:[0.24,0.94,0.24], r:0.36, vr:1.75},   NA:{c:[0.67,0.36,0.95], r:0.46, vr:2.27},
  K :{c:[0.56,0.25,0.83], r:0.52, vr:2.75},   CO:{c:[0.94,0.56,0.63], r:0.42, vr:1.52},
  FB:{c:[0.55,0.55,0.55], r:0.32, vr:1.60},
};
const info = code => ELEM[EL_LIST[code]] || ELEM.FB;

/* ── Element registry (symbol ↔ small integer code) ───────────────────── */
const EL_CODE = new Map(), EL_LIST = [];
function codeOf(sybyl){
  const dot = sybyl.indexOf('.');
  let sym = (dot === -1 ? sybyl : sybyl.slice(0, dot)).toUpperCase();
  if(!ELEM[sym]) sym = 'FB';
  let c = EL_CODE.get(sym);
  if(c === undefined){ c = EL_LIST.length; EL_CODE.set(sym, c); EL_LIST.push(sym); }
  return c;
}

const setLbl = t => { const e = document.getElementById('load-lbl'); if(e) e.textContent = t; };
const setBar = v => { const e = document.getElementById('load-bar');
  if(e) e.style.transform = 'scaleX(' + Math.max(0, Math.min(1, v/100)) + ')'; };
const yield_ = () => new Promise(r => setTimeout(r, 0));

/* ── Parse a multi-molecule mol2 into typed-array records ──────────────── */
function parseMol2(text){
  const lines = text.split('\n');
  const mols = [];
  let cur = null, section = '';
  for(let i = 0; i < lines.length; i++){
    const ln = lines[i];
    if(ln.charCodeAt(0) === 64){                 // '@' → section marker
      const t = ln.trim();
      if(t === '@<TRIPOS>MOLECULE'){ cur = {name:null}; mols.push(cur); section = 'HDR'; }
      else if(t === '@<TRIPOS>ATOM')  section = 'ATOM';
      else if(t === '@<TRIPOS>BOND')  section = 'BOND';
      else section = 'OTHER';
      continue;
    }
    if(section === 'HDR'){
      if(cur.name === null){ cur.name = ln.trim(); }
      else if(cur.na === undefined){
        const p = ln.trim().split(/\s+/);
        cur.na = +p[0]; cur.nb = +p[1] || 0;
        cur.x  = new Float32Array(cur.na); cur.y = new Float32Array(cur.na);
        cur.z  = new Float32Array(cur.na); cur.el = new Uint16Array(cur.na); cur.ai = 0;
        cur.b1 = new Int32Array(cur.nb);   cur.b2 = new Int32Array(cur.nb);  cur.bi = 0;
      }
      continue;
    }
    if(section === 'ATOM'){
      const p = ln.trim().split(/\s+/);
      if(p.length < 6 || cur.ai >= cur.na) continue;
      const k = cur.ai++;
      cur.x[k] = +p[2]; cur.y[k] = +p[3]; cur.z[k] = +p[4]; cur.el[k] = codeOf(p[5]);
    } else if(section === 'BOND'){
      const p = ln.trim().split(/\s+/);
      if(p.length < 4 || cur.bi >= cur.nb) continue;
      const k = cur.bi++;
      cur.b1[k] = (+p[1]) - 1; cur.b2[k] = (+p[2]) - 1;
    }
  }
  return mols.filter(m => m.na > 0);
}

/* David Goodsell–style ink outline: mark pixels where the linear depth jumps
   (silhouette against the background + big steps between spheres). A ring of
   samples at `thickness` px gives a solid band ~2×thickness wide. */
BABYLON.Effect.ShadersStore['goodsellFragmentShader'] = `
precision highp float;
varying vec2 vUV;
uniform sampler2D textureSampler;
uniform sampler2D depthSampler;
uniform vec2 texel;
uniform vec3 outlineColor;
uniform float thickness;
uniform float threshold;
void main(void){
  float c = texture2D(depthSampler, vUV).r;
  float md = 0.0;
  for(int i=0;i<8;i++){
    float a = float(i)*0.7853981634;
    vec2 o = vec2(cos(a),sin(a))*texel*thickness;
    md = max(md, abs(texture2D(depthSampler, vUV+o).r - c));
  }
  vec4 col = texture2D(textureSampler, vUV);
  gl_FragColor = mix(col, vec4(outlineColor,1.0), step(threshold, md));
}`;

let engine = null;

/* ── Fetch + parse + build a mol2 file, then render it ─────────────────── */
async function run(fileName){
  const url = /^(https?:|\.?\/)/.test(fileName) ? fileName : './' + fileName;

  /* Fetch (streamed for a progress bar) */
  setLbl(`Fetching ${fileName}…`);
  const res = await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status} — is "${fileName}" next to index.html?`);
  const total = +res.headers.get('Content-Length') || 0;
  const reader = res.body.getReader(); const chunks = []; let got = 0;
  for(;;){
    const {done, value} = await reader.read();
    if(done) break; chunks.push(value); got += value.length;
    if(total) setBar((got / total) * 55);   // download fills the first ~55%
  }
  const buf = new Uint8Array(got); let off = 0;
  for(const ch of chunks){ buf.set(ch, off); off += ch.length; }
  // Compositor-driven creep to ~96% so the bar keeps moving smoothly through the
  // main-thread-blocking parse + build phases (transform animates off the main thread).
  const barEl = document.getElementById('load-bar');
  if(barEl){ barEl.style.transition = 'transform 5s cubic-bezier(0.15,0.75,0.2,1)';
             barEl.style.transform  = 'scaleX(0.96)'; }
  await new Promise(r => { requestAnimationFrame(() => requestAnimationFrame(r)); setTimeout(r, 120); });  // commit (rAF), with timeout fallback for hidden tabs
  const mols = parseMol2(new TextDecoder().decode(buf));
  if(mols.length === 0) throw new Error('No molecules found in file');

  // Rotate 90° about Z so the long axis lies horizontal (PSII lands on its side)
  for(const m of mols){
    for(let k=0;k<m.na;k++){ const x=m.x[k], y=m.y[k]; m.x[k]=y; m.y[k]=-x; }
  }

  /* Lay models out side by side; compute per-model bbox + offset */
  setLbl('Arranging models…'); await yield_();
  const box = [];
  for(const m of mols){
    let miX=Infinity,miY=Infinity,miZ=Infinity,maX=-Infinity,maY=-Infinity,maZ=-Infinity;
    for(let k=0;k<m.na;k++){
      const x=m.x[k],y=m.y[k],z=m.z[k];
      if(x<miX)miX=x; if(y<miY)miY=y; if(z<miZ)miZ=z;
      if(x>maX)maX=x; if(y>maY)maY=y; if(z>maZ)maZ=z;
    }
    box.push({miX,miY,miZ,maX,maY,maZ,w:maX-miX});
  }
  const meanW = box.reduce((s,b)=>s+b.w,0)/box.length;
  const gap   = meanW*GAP_FRAC;
  const rowW  = box.reduce((s,b)=>s+b.w,0)+gap*(mols.length-1);
  let cursor  = -rowW/2;
  for(let mi=0;mi<mols.length;mi++){
    const b=box[mi];
    const cx=(b.miX+b.maX)/2, cy=(b.miY+b.maY)/2, cz=(b.miZ+b.maZ)/2;
    mols[mi].ox = (cursor + b.w/2) - cx; mols[mi].oy = -cy; mols[mi].oz = -cz;
    cursor += b.w + gap;
  }

  /* Count atoms + bond-halves per element (for typed-array sizing) */
  const nEl = EL_LIST.length;
  const atomCount = new Uint32Array(nEl), halfCount = new Uint32Array(nEl);
  for(const m of mols){
    for(let k=0;k<m.na;k++) atomCount[m.el[k]]++;
    for(let k=0;k<m.nb;k++){
      const a1=m.b1[k], a2=m.b2[k];
      if(a1<0||a1>=m.na||a2<0||a2>=m.na) continue;
      halfCount[m.el[a1]]++; halfCount[m.el[a2]]++;
    }
  }

  /* Engine/scene */
  const canvas = document.getElementById('c');
  engine = new BABYLON.Engine(canvas, true, {stencil:false});
  const scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(1.0,0.996,0.976,1);   // #fffef9
  const cam = new BABYLON.ArcRotateCamera('cam', -Math.PI/2, Math.PI/2.3, 100,
    BABYLON.Vector3.Zero(), scene);
  cam.attachControl(canvas, true);
  cam.fov = 0.8; cam.minZ = 0.05; cam.inertia = 0.85; cam.panningSensibility = 20;
  cam.lowerBetaLimit = null; cam.upperBetaLimit = null;   // full 360° vertical rotation
  // Auto-rotate whenever the left button is NOT held; show the zoom tips while
  // rotating and keep them for 2 s after the drag is released (or after a tap).
  const tips = document.getElementById('zoomtips');
  let leftDown = false, hideTimer = null;
  const showTips = () => { if(!tips) return; clearTimeout(hideTimer); hideTimer = null; tips.classList.add('show'); };
  const hideTipsSoon = () => { if(!tips) return; clearTimeout(hideTimer); hideTimer = setTimeout(() => tips.classList.remove('show'), 2000); };
  scene.onPointerObservable.add(p => {
    if(p.type === BABYLON.PointerEventTypes.POINTERDOWN && p.event.button === 0){ leftDown = true; showTips(); }
    else if(p.type === BABYLON.PointerEventTypes.POINTERUP){ leftDown = false; hideTipsSoon(); }
  });
  scene.onBeforeRenderObservable.add(() => {
    if(!leftDown) cam.alpha += 0.003 * (Math.min(engine.getDeltaTime(),50)/16.67);
  });

  // Zoom via the on-screen +/− buttons only (mouse-wheel + arrow-key inputs removed)
  cam.inputs.removeByType('ArcRotateCameraMouseWheelInput');
  cam.inputs.removeByType('ArcRotateCameraKeyboardMoveInput');
  const zoom = dir => {   // dir: -1 = in, +1 = out
    const lo = cam.lowerRadiusLimit ?? 1, hi = cam.upperRadiusLimit ?? 1e9;
    cam.radius = Math.max(lo, Math.min(hi, cam.radius + dir * cam.radius * 0.05));
  };
  const btnZoom = dir => { zoom(dir); showTips(); hideTipsSoon(); };   // tap keeps tips visible 2 s more
  document.getElementById('zoom-in').addEventListener('click',  () => btnZoom(-1));
  document.getElementById('zoom-out').addEventListener('click', () => btnZoom(1));
  // Bright, full lighting so no camera-facing side falls into shadow.
  const hemi = new BABYLON.HemisphericLight('h', new BABYLON.Vector3(0,1,0), scene);
  hemi.intensity = 0.9; hemi.groundColor = new BABYLON.Color3(0.55,0.55,0.55);
  const dir = new BABYLON.DirectionalLight('d', new BABYLON.Vector3(-0.4,-1,-0.5), scene);
  dir.intensity = 0.6;
  const dir2 = new BABYLON.DirectionalLight('d2', new BABYLON.Vector3(0.6,-0.2,0.5), scene);
  dir2.intensity = 0.45;

  /* Allocate instance buffers + build geometry */
  setLbl(`Building ${mols.length} model(s)…`); await yield_();
  const sphBuf = [], cylBuf = [], sphIdx = new Uint32Array(nEl), cylIdx = new Uint32Array(nEl);
  for(let e=0;e<nEl;e++){
    sphBuf[e] = new Float32Array(atomCount[e]*16);
    cylBuf[e] = new Float32Array(halfCount[e]*16);
  }
  const _m = new BABYLON.Matrix(), _q = new BABYLON.Quaternion(),
        _s = new BABYLON.Vector3(), _p = new BABYLON.Vector3(), _ax = new BABYLON.Vector3();
  const bondD = BOND_R*2;

  function cylTo(sx,sy,sz, ex,ey,ez, dstBuf, dstOff){
    let dx=ex-sx, dy=ey-sy, dz=ez-sz;
    const len=Math.hypot(dx,dy,dz)||1e-6, inv=1/len; dx*=inv; dy*=inv; dz*=inv;
    if(dy>0.999999) _q.set(0,0,0,1);
    else if(dy<-0.999999) _q.set(1,0,0,0);
    else { _ax.set(dz,0,-dx); _ax.normalize(); BABYLON.Quaternion.RotationAxisToRef(_ax, Math.acos(dy), _q); }
    _s.set(bondD,len,bondD); _p.set((sx+ex)*0.5,(sy+ey)*0.5,(sz+ez)*0.5);
    BABYLON.Matrix.ComposeToRef(_s,_q,_p,_m); _m.copyToArray(dstBuf,dstOff);
  }

  for(const m of mols){
    const ox=m.ox, oy=m.oy, oz=m.oz;
    for(let k=0;k<m.na;k++){
      const e=m.el[k];
      BABYLON.Matrix.TranslationToRef(m.x[k]+ox, m.y[k]+oy, m.z[k]+oz, _m);
      _m.copyToArray(sphBuf[e], (sphIdx[e]++)*16);
    }
    for(let k=0;k<m.nb;k++){
      const a1=m.b1[k], a2=m.b2[k];
      if(a1<0||a1>=m.na||a2<0||a2>=m.na) continue;
      const x1=m.x[a1]+ox, y1=m.y[a1]+oy, z1=m.z[a1]+oz;
      const x2=m.x[a2]+ox, y2=m.y[a2]+oy, z2=m.z[a2]+oz;
      const mx=(x1+x2)*0.5, my=(y1+y2)*0.5, mz=(z1+z2)*0.5;
      const e1=m.el[a1], e2=m.el[a2];
      cylTo(x1,y1,z1, mx,my,mz, cylBuf[e1], (cylIdx[e1]++)*16);
      cylTo(mx,my,mz, x2,y2,z2, cylBuf[e2], (cylIdx[e2]++)*16);
    }
  }
  await yield_();

  /* One sphere + one cylinder mesh per element, plus a full-vdW sphere set
     (reusing the same instance positions) for the space-filling surface mode. */
  setLbl('Uploading to GPU…'); await yield_();
  // Space-filling surface: single translucent green material (not per-element),
  // drawn over the ball-and-stick so both are visible at once.
  const fillMat = new BABYLON.StandardMaterial('fillmat', scene);
  fillMat.diffuseColor  = new BABYLON.Color3(0.16, 0.55, 0.24);
  fillMat.emissiveColor = new BABYLON.Color3(0.03, 0.11, 0.05);  // gentle fill so shadows aren't muddy
  fillMat.specularColor = new BABYLON.Color3(0, 0, 0);           // matte — no highlights (Goodsell)
  fillMat.alpha = 1.0;                                            // opaque
  fillMat.freeze();
  for(let e=0;e<nEl;e++){
    const [r,g,b] = info(e).c;
    const mat = new BABYLON.StandardMaterial('m'+e, scene);
    mat.diffuseColor  = new BABYLON.Color3(r,g,b);
    mat.specularColor = new BABYLON.Color3(0.18,0.18,0.18);
    mat.specularPower = 64; mat.freeze();
    if(atomCount[e] > 0){
      const sph = BABYLON.MeshBuilder.CreateSphere('a'+e, {diameter:info(e).r*2, segments:6}, scene);
      sph.material = mat; sph.isPickable = false;
      sph.thinInstanceSetBuffer('matrix', sphBuf[e], 16, true); sph.freezeWorldMatrix();
      const fill = BABYLON.MeshBuilder.CreateSphere('f'+e, {diameter:info(e).vr*2*FILL_SCALE, segments:8}, scene);
      fill.material = fillMat; fill.isPickable = false;
      fill.thinInstanceSetBuffer('matrix', sphBuf[e], 16, true); fill.freezeWorldMatrix();
    }
    if(halfCount[e] > 0){
      const cyl = BABYLON.MeshBuilder.CreateCylinder('b'+e,
        {diameter:1, height:1, tessellation:6, cap:BABYLON.Mesh.NO_CAP}, scene);
      cyl.material = mat; cyl.isPickable = false;
      cyl.thinInstanceSetBuffer('matrix', cylBuf[e], 16, true); cyl.freezeWorldMatrix();
    }
  }

  /* Frame camera on the whole row (fit both axes for any viewport aspect) */
  let gMiX=Infinity,gMiY=Infinity,gMaX=-Infinity,gMaY=-Infinity,gMiZ=Infinity,gMaZ=-Infinity;
  for(let mi=0;mi<mols.length;mi++){
    const b=box[mi];
    gMiX=Math.min(gMiX,b.miX+mols[mi].ox); gMaX=Math.max(gMaX,b.maX+mols[mi].ox);
    gMiY=Math.min(gMiY,b.miY+mols[mi].oy); gMaY=Math.max(gMaY,b.maY+mols[mi].oy);
    gMiZ=Math.min(gMiZ,b.miZ+mols[mi].oz); gMaZ=Math.max(gMaZ,b.maZ+mols[mi].oz);
  }
  const dimX=gMaX-gMiX, dimY=gMaY-gMiY, dimZ=Math.max(gMaZ-gMiZ,1);
  cam.setTarget(new BABYLON.Vector3((gMiX+gMaX)/2,(gMiY+gMaY)/2,(gMiZ+gMaZ)/2));
  const aspect = engine.getRenderWidth()/Math.max(engine.getRenderHeight(),1);
  const tanV = Math.tan(cam.fov/2);
  cam.radius = Math.max(dimY/2/tanV, dimX/2/(tanV*aspect), dimZ)*1.08;
  cam.lowerRadiusLimit = Math.max(dimY,dimZ)*0.03;
  cam.upperRadiusLimit = cam.radius*4;
  cam.wheelPrecision   = 60/Math.max(dimX,1);
  cam.panningSensibility = 6000/Math.max(dimX,1);

  // Remember the framed "home" view; double-click resets size + position to it
  const home = { alpha: cam.alpha, beta: cam.beta, radius: cam.radius, target: cam.target.clone() };
  const resetView = () => {
    cam.inertialAlphaOffset = cam.inertialBetaOffset = cam.inertialRadiusOffset = 0;
    cam.inertialPanningX = cam.inertialPanningY = 0;
    cam.setTarget(home.target.clone());   // first — setTarget recomputes alpha/beta/radius…
    cam.alpha = home.alpha; cam.beta = home.beta; cam.radius = home.radius;  // …then override
  };
  canvas.addEventListener('dblclick', resetView);                                   // desktop
  scene.onPointerObservable.add(p => {                                              // touch double-tap
    if(p.type === BABYLON.PointerEventTypes.POINTERDOUBLETAP) resetView();
  });

  /* Floating per-model labels (multi-molecule files only) */
  const labels = mols.length===1 ? [] : mols.map((m,mi) => {
    const el = document.createElement('div'); el.className = 'mlbl';
    el.textContent = m.name; document.body.appendChild(el);
    const b = box[mi];
    el.pos = new BABYLON.Vector3((b.miX+b.maX)/2+m.ox, b.maY+m.oy+dimY*0.02, (b.miZ+b.maZ)/2+m.oz);
    return el;
  });
  scene.registerAfterRender(() => {
    const vp = cam.viewport.toGlobal(engine.getRenderWidth(), engine.getRenderHeight());
    const tm = scene.getTransformMatrix();
    for(const el of labels){
      const p = BABYLON.Vector3.Project(el.pos, BABYLON.Matrix.Identity(), tm, vp);
      const vis = p.z>0 && p.z<1;
      el.style.display = vis ? 'block' : 'none';
      if(vis){ el.style.left=(p.x-el.offsetWidth/2)+'px'; el.style.top=(p.y-el.offsetHeight-4)+'px'; }
    }
  });

  if(barEl){ barEl.style.transition = 'transform 0.25s ease-out'; barEl.style.transform = 'scaleX(1)'; }
  document.getElementById('overlay').classList.add('gone');

  // David Goodsell look: thick dark ink outline via depth-based edge detection
  const depthRenderer = scene.enableDepthRenderer(cam, false, true);
  const outlinePP = new BABYLON.PostProcess('goodsell', 'goodsell',
    ['texel','outlineColor','thickness','threshold'], ['depthSampler'], 1.0, cam);
  const outlineCol = new BABYLON.Color3(0.09, 0.11, 0.09);
  outlinePP.onApply = (effect) => {
    effect.setTexture('depthSampler', depthRenderer.getDepthMap());
    effect.setFloat2('texel', 1/engine.getRenderWidth(), 1/engine.getRenderHeight());
    effect.setColor3('outlineColor', outlineCol);
    effect.setFloat('thickness', 3.0);
    effect.setFloat('threshold', 0.03);
  };

  // Perf fallback: after a short warm-up, measure the full-scene frame rate;
  // if the device can't sustain ~30 fps, drop the atoms + bonds and keep only
  // the (much lighter) van der Waals surface.
  const surfaceOnly = () => {
    for(const m of scene.meshes) if(/^[ab]\d+$/.test(m.name)) m.setEnabled(false);
  };
  let warmUntil = 0, winStart = 0, winFrames = 0, probeObs = null;
  probeObs = scene.onAfterRenderObservable.add(() => {
    const now = performance.now();
    if(warmUntil === 0){ warmUntil = now + 700; return; }   // ignore first ~0.7 s (shader/upload jank)
    if(now < warmUntil) return;
    if(winStart === 0){ winStart = now; winFrames = 0; return; }
    winFrames++;
    if(now - winStart >= 1500){                              // measure over 1.5 s
      const fps = winFrames * 1000 / (now - winStart);
      scene.onAfterRenderObservable.remove(probeObs);
      if(fps < 30) surfaceOnly();
    }
  });

  engine.runRenderLoop(() => scene.render());
  window.addEventListener('resize', () => engine.resize());
}

/* ── Auto-load PSII on page load (no prompt) ───────────────────────────── */
run('PSII.mol2').catch(err => {
  console.error(err);
  setLbl('Error: ' + err.message);
});
</script>
