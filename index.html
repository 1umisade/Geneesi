<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>VR Warehouse Sandbox — Babylon.js WebXR</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #111; color: #eee; font-family: system-ui, sans-serif; }
    #renderCanvas { width: 100%; height: 100%; display: block; touch-action: none; outline: none; }
    #hud {
      position: absolute; left: 12px; top: 12px; max-width: 360px;
      background: rgba(0,0,0,0.55); padding: 12px 14px; border-radius: 10px;
      font-size: 13px; line-height: 1.45; pointer-events: none;
    }
    #hud b { color: #ffd166; }
    #status { position:absolute; right:12px; top:12px; background:rgba(0,0,0,0.55); padding:8px 12px; border-radius:8px; font-size:12px; }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <div id="hud">
    <div><b>VR Warehouse Sandbox</b></div>
    <div>Put on your Quest 3 and tap the <b>Enter VR</b> button (bottom-right of the screen).</div>
    <div style="margin-top:6px;">In VR — squeeze the <b>grip</b> button near an object to grab it, release to throw. Use the <b>thumbstick</b> to teleport.</div>
    <div style="margin-top:6px; opacity:0.8;">Desktop preview: WASD to move, mouse to look.</div>
  </div>
  <div id="status">Loading…</div>

  <!-- Babylon.js core + materials + Havok physics -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
  <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>

  <script>
  (async function () {
    const statusEl = document.getElementById('status');
    const setStatus = (t) => { statusEl.textContent = t; };

    const canvas = document.getElementById('renderCanvas');
    const engine = new BABYLON.Engine(canvas, true, { stencil: true, preserveDrawingBuffer: true });
    const scene  = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color3(0.05, 0.06, 0.08);

    // ---------- Camera (desktop preview only; WebXR replaces it in VR) ----------
    const camera = new BABYLON.UniversalCamera('cam', new BABYLON.Vector3(0, 1.7, -6), scene);
    camera.setTarget(new BABYLON.Vector3(0, 1.5, 0));
    camera.attachControl(canvas, true);
    camera.speed = 0.25;
    camera.minZ = 0.05;
    camera.keysUp.push(87);    // W
    camera.keysDown.push(83);  // S
    camera.keysLeft.push(65);  // A
    camera.keysRight.push(68); // D

    // ---------- Lighting ----------
    const hemi = new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0, 1, 0), scene);
    hemi.intensity = 0.55;
    hemi.groundColor = new BABYLON.Color3(0.15, 0.15, 0.18);

    const sun = new BABYLON.DirectionalLight('sun', new BABYLON.Vector3(-0.5, -1, 0.3), scene);
    sun.intensity = 0.7;
    sun.position = new BABYLON.Vector3(10, 20, -10);

    // Industrial ceiling spots
    for (let i = -1; i <= 1; i++) {
      const sp = new BABYLON.SpotLight('sp' + i, new BABYLON.Vector3(i * 6, 7.8, 0), new BABYLON.Vector3(0, -1, 0), Math.PI / 2.5, 8, scene);
      sp.intensity = 0.4;
      sp.diffuse = new BABYLON.Color3(1, 0.95, 0.82);
    }

    // ---------- Physics (Havok) ----------
    setStatus('Initializing physics…');
    const havokInstance = await HavokPhysics();
    const havokPlugin = new BABYLON.HavokPlugin(true, havokInstance);
    scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), havokPlugin);

    // ---------- Warehouse environment ----------
    const ROOM = { w: 24, d: 24, h: 8 };

    const floor = BABYLON.MeshBuilder.CreateGround('floor', { width: ROOM.w, height: ROOM.d }, scene);
    const floorMat = new BABYLON.GridMaterial('floorMat', scene);
    floorMat.majorUnitFrequency = 4;
    floorMat.minorUnitVisibility = 0.4;
    floorMat.gridRatio = 1;
    floorMat.backFaceCulling = false;
    floorMat.mainColor = new BABYLON.Color3(0.32, 0.33, 0.35);
    floorMat.lineColor = new BABYLON.Color3(0.18, 0.18, 0.2);
    floorMat.opacity = 0.999;
    floor.material = floorMat;
    new BABYLON.PhysicsAggregate(floor, BABYLON.PhysicsShapeType.BOX, { mass: 0, friction: 0.7, restitution: 0.2 }, scene);

    const wallMat = new BABYLON.StandardMaterial('wallMat', scene);
    wallMat.diffuseColor = new BABYLON.Color3(0.42, 0.43, 0.46);
    wallMat.specularColor = new BABYLON.Color3(0.05, 0.05, 0.05);

    const ceilMat = new BABYLON.StandardMaterial('ceilMat', scene);
    ceilMat.diffuseColor = new BABYLON.Color3(0.22, 0.22, 0.24);

    function makeWall(name, w, h, d, x, y, z) {
      const m = BABYLON.MeshBuilder.CreateBox(name, { width: w, height: h, depth: d }, scene);
      m.position.set(x, y, z);
      m.material = wallMat;
      new BABYLON.PhysicsAggregate(m, BABYLON.PhysicsShapeType.BOX, { mass: 0, friction: 0.6, restitution: 0.2 }, scene);
      return m;
    }

    makeWall('wallN', ROOM.w, ROOM.h, 0.4,  0, ROOM.h / 2,  ROOM.d / 2);
    makeWall('wallS', ROOM.w, ROOM.h, 0.4,  0, ROOM.h / 2, -ROOM.d / 2);
    makeWall('wallE', 0.4, ROOM.h, ROOM.d,  ROOM.w / 2, ROOM.h / 2, 0);
    makeWall('wallW', 0.4, ROOM.h, ROOM.d, -ROOM.w / 2, ROOM.h / 2, 0);

    const ceiling = BABYLON.MeshBuilder.CreateBox('ceiling', { width: ROOM.w, height: 0.3, depth: ROOM.d }, scene);
    ceiling.position.set(0, ROOM.h, 0);
    ceiling.material = ceilMat;

    // ---------- Static warehouse shelves ----------
    const shelfMat = new BABYLON.StandardMaterial('shelfMat', scene);
    shelfMat.diffuseColor = new BABYLON.Color3(0.55, 0.4, 0.25);

    function makeShelfUnit(x, z, rotY) {
      const root = new BABYLON.TransformNode('shelfRoot', scene);
      root.position.set(x, 0, z);
      root.rotation.y = rotY;

      const W = 3.2, D = 0.9, postH = 4.5;
      const postPositions = [
        [ W/2 - 0.08,  D/2 - 0.08],
        [-W/2 + 0.08,  D/2 - 0.08],
        [ W/2 - 0.08, -D/2 + 0.08],
        [-W/2 + 0.08, -D/2 + 0.08],
      ];
      for (const [px, pz] of postPositions) {
        const post = BABYLON.MeshBuilder.CreateBox('post', { width: 0.12, height: postH, depth: 0.12 }, scene);
        post.position.set(px, postH/2, pz);
        post.parent = root;
        post.material = shelfMat;
      }
      for (let lvl = 0; lvl < 3; lvl++) {
        const y = 0.05 + lvl * 1.5;
        const shelf = BABYLON.MeshBuilder.CreateBox('shelf', { width: W, height: 0.08, depth: D }, scene);
        shelf.position.set(0, y, 0);
        shelf.parent = root;
        shelf.material = shelfMat;
      }

      root.computeWorldMatrix(true);
      root.getChildMeshes().forEach((m) => {
        new BABYLON.PhysicsAggregate(m, BABYLON.PhysicsShapeType.BOX, { mass: 0, friction: 0.6, restitution: 0.1 }, scene);
      });
      return root;
    }

    makeShelfUnit(-9,  -8, 0);
    makeShelfUnit(-9,  -2, 0);
    makeShelfUnit(-9,   4, 0);
    makeShelfUnit( 9,  -8, Math.PI);
    makeShelfUnit( 9,   4, Math.PI);

    setStatus('Spawning props…');
    // ---------- Grabbable physics objects ----------
    const grabbables = [];

    function randColor() {
      return new BABYLON.Color3(
        0.4 + Math.random() * 0.6,
        0.4 + Math.random() * 0.6,
        0.4 + Math.random() * 0.6
      );
    }

    function registerGrabbable(mesh, aggregate) {
      mesh.metadata = mesh.metadata || {};
      mesh.metadata.grabbable = true;
      mesh.metadata.aggregate = aggregate;
      grabbables.push(mesh);
    }

    function spawnBall(x, y, z, r) {
      const m = BABYLON.MeshBuilder.CreateSphere('ball', { diameter: r * 2, segments: 18 }, scene);
      m.position.set(x, y, z);
      const mat = new BABYLON.StandardMaterial('ballMat', scene);
      mat.diffuseColor = randColor();
      m.material = mat;
      const agg = new BABYLON.PhysicsAggregate(m, BABYLON.PhysicsShapeType.SPHERE,
        { mass: 0.6, friction: 0.5, restitution: 0.65 }, scene);
      registerGrabbable(m, agg);
      return m;
    }

    function spawnCrate(x, y, z, s) {
      const m = BABYLON.MeshBuilder.CreateBox('crate', { size: s }, scene);
      m.position.set(x, y, z);
      const mat = new BABYLON.StandardMaterial('crateMat', scene);
      mat.diffuseColor = new BABYLON.Color3(0.6, 0.42, 0.22);
      m.material = mat;
      const agg = new BABYLON.PhysicsAggregate(m, BABYLON.PhysicsShapeType.BOX,
        { mass: 1.2, friction: 0.6, restitution: 0.25 }, scene);
      registerGrabbable(m, agg);
      return m;
    }

    function spawnBottle(x, y, z) {
      const m = BABYLON.MeshBuilder.CreateCylinder('bottle', { height: 0.32, diameterTop: 0.06, diameterBottom: 0.1, tessellation: 18 }, scene);
      m.position.set(x, y, z);
      const mat = new BABYLON.StandardMaterial('bottleMat', scene);
      mat.diffuseColor = new BABYLON.Color3(0.2, 0.55, 0.35);
      mat.alpha = 0.85;
      m.material = mat;
      const agg = new BABYLON.PhysicsAggregate(m, BABYLON.PhysicsShapeType.CYLINDER,
        { mass: 0.35, friction: 0.5, restitution: 0.3 }, scene);
      registerGrabbable(m, agg);
      return m;
    }

    function spawnCan(x, y, z) {
      const m = BABYLON.MeshBuilder.CreateCylinder('can', { height: 0.14, diameter: 0.08, tessellation: 18 }, scene);
      m.position.set(x, y, z);
      const mat = new BABYLON.StandardMaterial('canMat', scene);
      mat.diffuseColor = new BABYLON.Color3(0.85, 0.2, 0.2);
      mat.specularColor = new BABYLON.Color3(0.4, 0.4, 0.4);
      m.material = mat;
      const agg = new BABYLON.PhysicsAggregate(m, BABYLON.PhysicsShapeType.CYLINDER,
        { mass: 0.2, friction: 0.45, restitution: 0.45 }, scene);
      registerGrabbable(m, agg);
      return m;
    }

    function makeTable(x, z) {
      const top = BABYLON.MeshBuilder.CreateBox('tabletop', { width: 2.4, height: 0.08, depth: 1.2 }, scene);
      top.position.set(x, 0.9, z);
      const tmat = new BABYLON.StandardMaterial('tmat', scene);
      tmat.diffuseColor = new BABYLON.Color3(0.5, 0.35, 0.2);
      top.material = tmat;
      new BABYLON.PhysicsAggregate(top, BABYLON.PhysicsShapeType.BOX, { mass: 0, friction: 0.7, restitution: 0.2 }, scene);

      for (const [lx, lz] of [[1.1, 0.5], [-1.1, 0.5], [1.1, -0.5], [-1.1, -0.5]]) {
        const leg = BABYLON.MeshBuilder.CreateBox('leg', { width: 0.08, height: 0.86, depth: 0.08 }, scene);
        leg.position.set(x + lx, 0.43, z + lz);
        leg.material = tmat;
        new BABYLON.PhysicsAggregate(leg, BABYLON.PhysicsShapeType.BOX, { mass: 0, friction: 0.7, restitution: 0.2 }, scene);
      }
    }
    makeTable(0, -2);

    // Stuff on the table
    spawnBall(-0.6, 1.2,  -2.2, 0.1);
    spawnBall(-0.1, 1.2,  -1.7, 0.12);
    spawnBall( 0.6, 1.2,  -2.2, 0.09);
    spawnCan ( 0.0, 1.05, -2.0);
    spawnCan ( 0.3, 1.05, -1.6);
    spawnBottle(-0.4, 1.16, -1.6);
    spawnBottle( 0.6, 1.16, -1.5);

    // Stack of crates to knock over
    spawnCrate( 4, 0.3,  4, 0.55);
    spawnCrate( 4, 0.9,  4, 0.5);
    spawnCrate( 4, 1.4,  4, 0.45);
    spawnCrate( 5, 0.3,  4, 0.5);
    spawnCrate( 5, 0.85, 4, 0.45);
    spawnCrate( 3, 0.3,  4, 0.5);

    // Bowling-pin cluster of cans, far end
    for (let i = 0; i < 5; i++) spawnCan(-2 + i * 0.18, 0.08, 8);
    for (let i = 0; i < 4; i++) spawnCan(-1.8 + i * 0.18, 0.08, 8.3);

    // Loose balls scattered
    for (let i = 0; i < 10; i++) {
      const x = (Math.random() - 0.5) * 8;
      const z = (Math.random() - 0.5) * 6 + 1;
      spawnBall(x, 0.3 + Math.random() * 0.5, z, 0.07 + Math.random() * 0.08);
    }

    // ---------- Blue hand mesh (replaces controller models) ----------
    const handMat = new BABYLON.StandardMaterial('handMat', scene);
    handMat.diffuseColor = new BABYLON.Color3(0.18, 0.42, 0.95);
    handMat.specularColor = new BABYLON.Color3(0.25, 0.25, 0.35);
    handMat.emissiveColor = new BABYLON.Color3(0.02, 0.05, 0.12);

    function buildHand(isRight) {
      const root = new BABYLON.TransformNode('hand_' + (isRight ? 'R' : 'L'), scene);

      // Palm — flattened ellipsoid pointing along +Z
      const palm = BABYLON.MeshBuilder.CreateSphere('palm', { diameter: 0.085, segments: 14 }, scene);
      palm.scaling = new BABYLON.Vector3(1, 0.55, 1.5);
      palm.material = handMat;
      palm.isPickable = false;
      palm.parent = root;

      // 4 fingers extending forward
      for (let i = 0; i < 4; i++) {
        const finger = BABYLON.MeshBuilder.CreateCapsule('finger' + i, { radius: 0.012, height: 0.07, tessellation: 12 }, scene);
        finger.material = handMat;
        finger.isPickable = false;
        finger.parent = root;
        const x = (i - 1.5) * 0.022;
        finger.position.set(x, 0, 0.075);
        finger.rotation.x = Math.PI / 2;
      }

      // Thumb angled inward
      const thumb = BABYLON.MeshBuilder.CreateCapsule('thumb', { radius: 0.014, height: 0.06, tessellation: 12 }, scene);
      thumb.material = handMat;
      thumb.isPickable = false;
      thumb.parent = root;
      const side = isRight ? -1 : 1;
      thumb.position.set(side * 0.045, 0, 0.015);
      thumb.rotation.x = Math.PI / 2;
      thumb.rotation.y = side * Math.PI / 5;

      // Wrist cuff
      const cuff = BABYLON.MeshBuilder.CreateCylinder('cuff', { height: 0.04, diameter: 0.08, tessellation: 16 }, scene);
      cuff.material = handMat;
      cuff.isPickable = false;
      cuff.parent = root;
      cuff.position.set(0, 0, -0.05);
      cuff.rotation.x = Math.PI / 2;

      return root;
    }

    // ---------- Per-controller state ----------
    const handState = new Map();

    function createHandState(controllerUniqueId, parentNode, isRight) {
      const handRoot = buildHand(isRight);
      handRoot.parent = parentNode;
      handRoot.position.set(0, 0, 0);

      const grabAnchor = new BABYLON.TransformNode('grabAnchor', scene);
      grabAnchor.parent = handRoot;
      grabAnchor.position.set(0, 0, 0.04);

      const state = {
        controllerUniqueId,
        handRoot,
        grabAnchor,
        parentNode,
        isRight,
        held: null,
        heldAggregate: null,
        prevMotionType: null,
        samples: [],
        heldLocalOffset: null,
        heldRotOffset: null,
      };
      handState.set(controllerUniqueId, state);
      return state;
    }

    function nearestGrabbable(worldPos, maxDist) {
      let best = null;
      let bestD = maxDist;
      for (const mesh of grabbables) {
        if (mesh._heldBy) continue;
        const d = BABYLON.Vector3.Distance(mesh.getAbsolutePosition(), worldPos);
        if (d < bestD) { bestD = d; best = mesh; }
      }
      return best;
    }

    function grab(state, mesh) {
      if (!mesh || state.held) return;
      mesh._heldBy = state.controllerUniqueId;

      const agg = mesh.metadata.aggregate;
      state.heldAggregate = agg;
      state.prevMotionType = agg.body.getMotionType();
      agg.body.setMotionType(BABYLON.PhysicsMotionType.ANIMATED);

      const anchorMat = state.grabAnchor.getWorldMatrix();
      const meshWorld = mesh.getAbsolutePosition();
      const inv = BABYLON.Matrix.Invert(anchorMat);
      const localOffset = BABYLON.Vector3.TransformCoordinates(meshWorld, inv);

      state.held = mesh;
      state.heldLocalOffset = localOffset;

      if (!mesh.rotationQuaternion) {
        mesh.rotationQuaternion = BABYLON.Quaternion.FromEulerVector(mesh.rotation);
      }
      const handRot = state.grabAnchor.absoluteRotationQuaternion.clone();
      const handRotInv = BABYLON.Quaternion.Inverse(handRot);
      state.heldRotOffset = handRotInv.multiply(mesh.rotationQuaternion.clone());

      state.samples = [];
    }

    function release(state) {
      if (!state.held) return;
      const agg = state.heldAggregate;

      const now = performance.now();
      const samples = state.samples.filter(s => now - s.t < 200);
      let linVel = new BABYLON.Vector3(0, 0, 0);
      const angVel = new BABYLON.Vector3(0, 0, 0);
      if (samples.length >= 2) {
        const first = samples[0];
        const last = samples[samples.length - 1];
        const dt = (last.t - first.t) / 1000;
        if (dt > 0.001) {
          linVel = last.pos.subtract(first.pos).scale(1 / dt);
          linVel.scaleInPlace(1.15);
        }
      }

      agg.body.setMotionType(state.prevMotionType ?? BABYLON.PhysicsMotionType.DYNAMIC);
      agg.body.setLinearVelocity(linVel);
      agg.body.setAngularVelocity(angVel);

      state.held._heldBy = null;
      state.held = null;
      state.heldAggregate = null;
      state.heldLocalOffset = null;
      state.heldRotOffset = null;
      state.samples = [];
    }

    // ---------- WebXR setup ----------
    setStatus('Preparing WebXR…');
    const xr = await scene.createDefaultXRExperienceAsync({
      floorMeshes: [floor],
      disableTeleportation: false,
      optionalFeatures: true,
      inputOptions: {
        doNotLoadControllerMeshes: true, // we render blue hands instead
      },
    });

    xr.baseExperience.onStateChangedObservable.add((s) => {
      if (s === BABYLON.WebXRState.IN_XR) {
        document.getElementById('hud').style.display = 'none';
        document.getElementById('status').style.display = 'none';
      } else {
        document.getElementById('hud').style.display = '';
        document.getElementById('status').style.display = '';
      }
    });

    xr.input.onControllerAddedObservable.add((controller) => {
      const isRight = controller.inputSource && controller.inputSource.handedness === 'right';

      const attach = () => {
        const parent = controller.grip || controller.pointer;
        if (!parent) return null;
        return createHandState(controller.uniqueId, parent, isRight);
      };

      controller.onMotionControllerInitObservable.add((mc) => {
        const state = handState.get(controller.uniqueId) || attach();
        if (!state) return;

        const squeeze = mc.getComponent('xr-standard-squeeze');
        const trigger = mc.getComponent('xr-standard-trigger');

        const doGrab = () => {
          const wp = state.grabAnchor.getAbsolutePosition();
          const m = nearestGrabbable(wp, 0.3);
          if (m) grab(state, m);
        };
        const doRelease = () => release(state);

        if (squeeze) {
          squeeze.onButtonStateChangedObservable.add(() => {
            if (squeeze.changes.pressed) {
              if (squeeze.pressed) doGrab(); else doRelease();
            }
          });
        }
        if (trigger) {
          trigger.onButtonStateChangedObservable.add(() => {
            if (trigger.changes.pressed) {
              if (trigger.pressed) doGrab(); else doRelease();
            }
          });
        }

        // Hide any default controller mesh that may have slipped through
        if (mc.rootMesh) mc.rootMesh.setEnabled(false);
      });

      attach();
    });

    xr.input.onControllerRemovedObservable.add((controller) => {
      const s = handState.get(controller.uniqueId);
      if (s) {
        if (s.held) release(s);
        s.handRoot.dispose();
        handState.delete(controller.uniqueId);
      }
    });

    // ---------- Per-frame: drive held objects, sample velocity ----------
    scene.onBeforeRenderObservable.add(() => {
      const now = performance.now();
      handState.forEach((state) => {
        if (!state.grabAnchor) return;
        const wp = state.grabAnchor.getAbsolutePosition().clone();

        state.samples.push({ t: now, pos: wp });
        while (state.samples.length > 0 && now - state.samples[0].t > 250) {
          state.samples.shift();
        }

        if (state.held && state.heldAggregate) {
          const anchorMat = state.grabAnchor.getWorldMatrix();
          const targetPos = BABYLON.Vector3.TransformCoordinates(state.heldLocalOffset, anchorMat);
          const anchorRot = state.grabAnchor.absoluteRotationQuaternion;
          const targetRot = anchorRot.multiply(state.heldRotOffset);
          state.heldAggregate.body.setTargetTransform(targetPos, targetRot);
        }
      });
    });

    setStatus('Ready — click "Enter VR" or use WASD to look around.');
    engine.runRenderLoop(() => scene.render());
    window.addEventListener('resize', () => engine.resize());

    console.log('VR Warehouse Sandbox ready. Grabbables:', grabbables.length);
  })().catch((err) => {
    console.error(err);
    document.getElementById('status').textContent = 'Error: ' + (err && err.message ? err.message : err);
  });
  </script>
</body>
</html>
